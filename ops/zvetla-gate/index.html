<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zvetla CRM</title>
<meta name="robots" content="noindex">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#12100e;color:#f5efe6;font-family:system-ui,-apple-system,sans-serif}
  .card{text-align:center;padding:40px}
  h1{font-weight:300;letter-spacing:4px;font-size:28px;margin:0 0 18px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#c9a86a;
       animation:p 1.1s ease-in-out infinite;margin:0 3px}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes p{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  #st{margin-top:16px;font-size:14px;color:#b8ab95;min-height:20px}
</style>
</head>
<body>
<div class="card">
  <h1>ZVETLA CRM</h1>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="st">Підключення…</div>
</div>
<script>
/* Ворота Zvetla CRM: единственный адрес для всех.
   Сами находят живой сервер (основной приоритетнее) и перекидывают на него.
   Статичная страница — не спит, не тратит лимиты, состояние нигде не хранится:
   правда выясняется прямым пингом каждый раз. Если оба спят — пинги их будят. */
var TARGETS = [
  'https://svs-shop-api.onrender.com',
  'https://svs-shop-api-backup.onrender.com'
];
var PATH = location.pathname === '/' ? '/admin/' : location.pathname; // /admin по умолчанию
var st = document.getElementById('st');

function ping(base, ms) {
  return new Promise(function (resolve) {
    var ctl = new AbortController();
    var t = setTimeout(function(){ ctl.abort(); resolve(null); }, ms);
    fetch(base + '/health', { signal: ctl.signal, cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){ clearTimeout(t); resolve(j && j.ok ? base : null); })
      .catch(function(){ clearTimeout(t); resolve(null); });
  });
}

function go(base) {
  st.textContent = 'Перехід…';
  location.replace(base + PATH + location.search + location.hash);
}

var attempt = 0;
function tryConnect() {
  attempt++;
  // основной проверяем первым; таймаут растёт: 4с → 8с → 15с (холодный сервер просыпается ~50с)
  var ms = attempt === 1 ? 4000 : attempt === 2 ? 8000 : 15000;
  ping(TARGETS[0], ms).then(function (ok) {
    if (ok) return go(ok);
    return ping(TARGETS[1], ms).then(function (ok2) {
      if (ok2) return go(ok2);
      st.textContent = attempt < 3 ? 'Сервер прокидається, зачекайте…'
                                   : 'Будимо сервер — до хвилини…';
      setTimeout(tryConnect, 3000);
    });
  });
}
tryConnect();
</script>
</body>
</html>
