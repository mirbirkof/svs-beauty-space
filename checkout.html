<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформлення замовлення — SVS Beauty Space</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/" async></script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav nav--scrolled">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-main">SVS</span>
        <span class="nav__logo-sub">Beauty Space</span>
      </a>
      <div class="shop-nav">
        <a href="shop.html" class="shop-nav__back-btn" aria-label="Назад до каталогу">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="checkout-page" id="checkoutPage">
    <!-- Rendered by checkout.js -->
    <div class="checkout-loading">
      <div class="checkout-spinner"></div>
      <p>Завантаження...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <a href="shop.html" class="footer__back">← До магазину</a>
      <span class="t-caption">&copy; 2026 SVS Beauty Space</span>
    </div>
  </footer>

  <script src="js/shop-data.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
