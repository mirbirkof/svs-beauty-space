<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Реєстрація салону · SVS Beauty Space</title>
<style>
  :root{ --bg:#0f1020; --card:#1a1b33; --ink:#eef0ff; --muted:#9aa0c7; --acc:#7c5cff; --acc2:#b69bff; --ok:#37d39a; --err:#ff6b7d; --line:#2b2d50; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Inter,sans-serif; background:radial-gradient(1200px 600px at 50% -10%,#23244a 0%,var(--bg) 60%); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap{ width:100%; max-width:460px; }
  .brand{ text-align:center; margin-bottom:20px; }
  .brand h1{ margin:0; font-size:22px; letter-spacing:.3px; }
  .brand p{ margin:6px 0 0; color:var(--muted); font-size:14px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  label{ display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
  input{ width:100%; padding:13px 14px; border-radius:11px; border:1px solid var(--line); background:#13142a; color:var(--ink); font-size:15px; outline:none; transition:border .15s; }
  input:focus{ border-color:var(--acc); }
  .plans{ display:flex; gap:8px; margin-top:6px; }
  .plan,.acct{ flex:1; cursor:pointer; border:1px solid var(--line); border-radius:11px; padding:11px 8px; text-align:center; font-size:13px; background:#13142a; transition:.15s; }
  .plan b,.acct b{ display:block; font-size:14px; margin-bottom:2px; }
  .plan small,.acct small{ color:var(--muted); font-size:11px; }
  .plan.active,.acct.active{ border-color:var(--acc); background:#1d1b3e; box-shadow:0 0 0 1px var(--acc) inset; }
  button{ width:100%; margin-top:22px; padding:14px; border:0; border-radius:12px; background:linear-gradient(135deg,var(--acc),var(--acc2)); color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:.15s; }
  button:disabled{ opacity:.55; cursor:not-allowed; }
  .hint{ font-size:12px; color:var(--muted); margin-top:14px; text-align:center; }
  .trial{ text-align:center; font-size:13px; color:var(--ok); margin-top:8px; }
  .msg{ margin-top:14px; padding:12px 14px; border-radius:11px; font-size:14px; display:none; }
  .msg.err{ display:block; background:rgba(255,107,125,.12); border:1px solid rgba(255,107,125,.4); color:var(--err); }
  .msg.ok{ display:block; background:rgba(55,211,154,.12); border:1px solid rgba(55,211,154,.4); color:var(--ok); }
  .msg.ok a{ color:var(--ok); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>SVS Beauty Space</h1>
      <p>CRM для салону краси — почніть за 1 хвилину</p>
    </div>
    <div class="card">
      <form id="f" autocomplete="on">
        <label>Тип акаунта</label>
        <div class="plans">
          <div class="acct active" data-acct="salon"><b>Салон</b><small>команда майстрів</small></div>
          <div class="acct" data-acct="solo"><b>Майстер</b><small>безкоштовно</small></div>
        </div>

        <label id="lbl_salon">Назва салону</label>
        <input id="salon_name" required maxlength="120" placeholder="Напр. Beauty Studio">

        <label id="lbl_owner">Ваше ім'я (власник)</label>
        <input id="owner_name" placeholder="Напр. Олена">

        <label>Телефон (логін у CRM)</label>
        <input id="phone" required inputmode="tel" placeholder="+380 ...">

        <label>Пароль (мін. 6 символів)</label>
        <input id="password" required type="password" minlength="6" placeholder="••••••">

        <label>E-mail (необов'язково)</label>
        <input id="email" type="email" placeholder="you@example.com">

        <div id="plan_block">
          <label>Тариф</label>
          <div class="plans">
            <div class="plan" data-plan="free"><b>Free</b><small>базовий</small></div>
            <div class="plan active" data-plan="pro"><b>Pro</b><small>популярний</small></div>
            <div class="plan" data-plan="enterprise"><b>Enterprise</b><small>мережа</small></div>
          </div>
        </div>
        <div class="trial" id="trial_note">14 днів безкоштовно · оплата пізніше · картка не потрібна</div>

        <label style="display:flex;gap:9px;align-items:flex-start;margin-top:16px;font-size:13px;font-weight:400;line-height:1.4;cursor:pointer">
          <input type="checkbox" id="consent" required style="width:auto;margin-top:2px;flex:0 0 auto">
          <span>Я погоджуюся на обробку персональних даних згідно з <a href="/p/privacy.html" target="_blank" style="color:var(--acc)">Політикою конфіденційності</a> (GDPR / ЗУ «Про захист персональних даних»)</span>
        </label>

        <button type="submit" id="btn">Почати безкоштовно</button>
        <div class="msg" id="msg"></div>
      </form>
      <div class="hint">Реєструючись, ви погоджуєтесь з умовами використання.</div>
    </div>
  </div>

<script>
  const API = location.origin;
  let plan = 'pro';
  let acct = 'salon';
  document.querySelectorAll('.plan').forEach(p => p.addEventListener('click', () => {
    document.querySelectorAll('.plan').forEach(x => x.classList.remove('active'));
    p.classList.add('active'); plan = p.dataset.plan;
  }));

  const planBlock = document.getElementById('plan_block');
  const trialNote = document.getElementById('trial_note');
  const lblSalon = document.getElementById('lbl_salon');
  const lblOwner = document.getElementById('lbl_owner');
  const btnEl = document.getElementById('btn');
  document.querySelectorAll('.acct').forEach(a => a.addEventListener('click', () => {
    document.querySelectorAll('.acct').forEach(x => x.classList.remove('active'));
    a.classList.add('active'); acct = a.dataset.acct;
    const solo = acct === 'solo';
    planBlock.style.display = solo ? 'none' : '';
    lblSalon.textContent = solo ? 'Назва профілю (ваше імʼя чи бренд)' : 'Назва салону';
    lblOwner.textContent = solo ? 'Ваше імʼя (майстер)' : "Ваше ім'я (власник)";
    trialNote.textContent = solo
      ? 'Безкоштовно назавжди · базові функції + платні модулі за бажанням'
      : '14 днів безкоштовно · оплата пізніше · картка не потрібна';
    btnEl.textContent = solo ? 'Створити безкоштовний профіль' : 'Почати безкоштовно';
  }));

  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  function show(type, html){ msg.className = 'msg ' + type; msg.innerHTML = html; }

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true; btn.textContent = 'Створюємо...'; msg.className = 'msg';
    const body = {
      salon_name: document.getElementById('salon_name').value.trim(),
      owner_name: document.getElementById('owner_name').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      password: document.getElementById('password').value,
      email: document.getElementById('email').value.trim() || null,
      account_type: acct,
      plan_code: acct === 'solo' ? 'solo' : plan,
    };
    try {
      const r = await fetch(API + '/api/public/signup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) {
        const human = {
          'phone-already-registered': 'Цей телефон вже зареєстрований. Увійдіть у наявний салон.',
          'password-min-6': 'Пароль має містити щонайменше 6 символів.',
          'valid-phone-required': 'Вкажіть коректний номер телефону.',
          'salon-name-required': 'Вкажіть назву салону.',
        }[data.error] || ('Помилка: ' + (data.error || 'спробуйте ще раз'));
        show('err', human); return;
      }
      const url = data.login_url || ('/admin/?tenant=' + encodeURIComponent(data.slug));
      const okText = acct === 'solo'
        ? 'Профіль <b>' + (data.salon_name || '') + '</b> створено! Базові функції безкоштовні назавжди.'
        : 'Салон <b>' + (data.salon_name || '') + '</b> створено! Тріал активний 14 днів.';
      show('ok', okText + '<br><br><a href="' + url + '">Увійти в кабінет →</a>');
      btn.textContent = 'Готово';
    } catch (err) {
      show('err', 'Мережна помилка. Перевірте зʼєднання і спробуйте ще раз.');
      btn.disabled = false; btn.textContent = 'Почати безкоштовно';
    }
  });
</script>
</body>
</html>
