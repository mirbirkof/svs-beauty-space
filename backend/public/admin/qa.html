<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QA-панель · SVS CRM</title>
<style>
:root{--bg:#0f1115;--card:#191c23;--card2:#20242d;--tx:#e8eaed;--mut:#9aa0aa;--line:#2a2f3a;--acc:#6c8cff;
--crit:#ff5470;--high:#ff9f43;--med:#ffd93d;--low:#8a92a0;--ok:#33d69f;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:16px;max-width:820px;margin:0 auto}
h1{font-size:20px;margin:0 0 4px}.sub{color:var(--mut);font-size:13px;margin-bottom:16px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;flex:1;min-width:110px}
.kpi b{font-size:22px;display:block}.kpi span{color:var(--mut);font-size:12px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px}
.tab.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.card .h{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.sev{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
.sev.critical{background:var(--crit);color:#fff}.sev.high{background:var(--high);color:#111}.sev.medium{background:var(--med);color:#111}.sev.low{background:var(--low);color:#fff}
.mod{color:var(--acc);font-weight:600;font-size:13px}.ttl{margin:4px 0;font-weight:600}
.meta{color:var(--mut);font-size:12.5px}
.det{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:13px;display:none}
.det.show{display:block}.det div{margin:3px 0}.det .lbl{color:var(--mut)}
.acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn.fix{background:var(--ok);color:#062}.btn.ign{background:var(--card2);color:var(--mut);border:1px solid var(--line)}
.btn.more{background:transparent;color:var(--acc);border:1px solid var(--line)}
.pausebtn{background:var(--high);color:#111}.pausebtn.paused{background:var(--ok);color:#052}
.empty{color:var(--mut);text-align:center;padding:24px}
.tag{font-size:11px;background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:1px 7px;color:var(--mut)}
table{width:100%;border-collapse:collapse;font-size:13px}td{padding:6px 4px;border-bottom:1px solid var(--line)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.err{background:#3a1420;border:1px solid var(--crit);border-radius:10px;padding:12px;margin-bottom:12px}
</style></head><body>
<h1>🧪 QA-панель <span id="pz"></span></h1>
<div class="sub" id="sub">загрузка…</div>
<div id="errbox"></div>
<div id="human" style="background:var(--card);border:1px solid var(--line);border-left:4px solid var(--ok);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:14px;line-height:1.5"></div>
<div class="bar" id="kpi"></div>
<div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn pausebtn" id="pauseBtn" onclick="togglePause()">⏸ Пауза</button>
<button class="btn fix" onclick="runNow()">🔄 Прогнать тесты сейчас</button>
<button class="btn fix" onclick="fixAll()">🔧 Починить все открытые</button>
<button class="btn more" onclick="load()">↻ Обновить</button></div>
<div id="msg" style="margin-bottom:10px;color:var(--ok);font-size:13px"></div>
<div class="tabs" id="tabs"></div>
<div id="list"></div>
<script>
const API=location.origin;
const TOKEN=localStorage.getItem('svs_admin_token')||new URLSearchParams(location.search).get('token')||'';
const TENANT=localStorage.getItem('svs_tenant_slug')||'';
function H(){const h={'Content-Type':'application/json','X-Admin-Token':TOKEN};if(TENANT)h['X-Tenant-Slug']=TENANT;return h;}
let S=null,tab='open';const SEVN={critical:0,high:1,medium:2,low:3};
async function load(){
 try{const r=await fetch(API+'/api/qa/state',{headers:H()});
  if(r.status===401||r.status===403){document.getElementById('errbox').innerHTML='<div class="err">Нет доступа. Открой панель из админки (где ты уже залогинен) или добавь ?token=… в адрес.</div>';return;}
  S=await r.json();document.getElementById('errbox').innerHTML='';render();
 }catch(e){document.getElementById('errbox').innerHTML='<div class="err">Ошибка связи: '+e.message+'</div>';}
}
function togglePause(){fetch(API+'/api/qa/'+(S&&S.paused?'resume':'pause'),{method:'POST',headers:H()}).then(()=>load());}
function flash(t){const m=document.getElementById('msg');if(m){m.textContent=t;setTimeout(()=>{if(m.textContent===t)m.textContent='';},5000);}}
function runNow(){fetch(API+'/api/qa/run-now',{method:'POST',headers:H()}).then(r=>r.json()).then(()=>{flash('✅ Запущен внеочередной прогон тестов — результат появится через минуту');load();});}
function fixAll(){if(!confirm('Отправить в работу ВСЕ открытые баги? Каждый пройдёт песочницу, деплой всё равно по твоей кнопке.'))return;fetch(API+'/api/qa/fix-all',{method:'POST',headers:H()}).then(r=>r.json()).then(d=>{flash('✅ В очередь на фикс: '+(d.queued||0)+' багов');load();});}
function act(sig,a){fetch(API+'/api/qa/bug/'+sig+'/'+a,{method:'POST',headers:H()}).then(()=>load());}
function tgl(id){document.getElementById(id).classList.toggle('show');}
function esc(s){return(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function render(){
 const st=S.status||{},b=st.bugs||{};
 document.getElementById('pz').innerHTML=S.paused?'<span class="tag" style="color:#ff9f43">на паузе</span>':'';
 document.getElementById('sub').textContent='Цикл '+(st.cycle||'?')+' · режим '+(st.mode||'?')+' · '+(st.modules||0)+' модулей, '+(st.checks||0)+' проверок';
 const pb=document.getElementById('pauseBtn');pb.textContent=S.paused?'▶️ Запустить':'⏸ Пауза';pb.classList.toggle('paused',!!S.paused);
 const ip=S.inProgress||S.fixQueue||[];
 const _await=ip.filter(x=>x.fixStage==='awaiting_approval').length;
 document.getElementById('kpi').innerHTML=
  kpi(S.open.length,'найдено','var(--crit)')+kpi(ip.length,'чинится','var(--acc)')+
  kpi(_await,'ждёт деплоя','var(--ok)')+kpi(S.closed.length,'исправлено','var(--mut)');
 // Человеческая сводка простым языком
 const ago=st.at?Math.round((Date.now()-new Date(st.at).getTime())/60000):null;
 const readyAgents=(st.agents||[]).filter(a=>a.status==='ready').length;
 const awaiting=ip.filter(x=>x.fixStage==='awaiting_approval').length;
 const working=ip.filter(x=>['fixing','sandbox_testing','queued'].includes(x.fixStage)).length;
 let human='🤖 <b>Система тестирует CRM сама, круглосуточно.</b> '+(S.paused?'<span style="color:var(--high)">Сейчас на паузе.</span>':'Работает.')+'<br>';
 human+='За последний прогон ('+(ago!=null?ago+' мин назад':'—')+'): '+readyAgents+' тестеров проверяют '+(st.modules||0)+' модулей ('+(st.checks||0)+' проверок).<br>';
 if(S.open.length) human+='🔴 Нашла <b>'+S.open.length+'</b> '+(S.open.length===1?'проблему':'проблем')+' — '+(working?'<b>'+working+'</b> уже чинит в песочнице сама. ':'разбирает. ');
 else human+='✅ Открытых проблем нет. ';
 if(awaiting) human+='<br>🚀 <b>'+awaiting+'</b> уже проверено в песочнице и <b>ждёт твоей кнопки «Деплоить»</b> (вкладка «В работе»).';
 else human+='<br>Как что-то будет готово к деплою — появится кнопка тут.';
 document.getElementById('human').innerHTML=human;
 const tabs=[['open','Найдено',S.open.length],['inProgress','Чинится / готово',ip.length],['manual','Ручная правка',(S.manual||[]).length],['ignored','Отклонено',S.ignored.length],['closed','Исправлено',S.closed.length],['agents','Тестеры',(st.agents||[]).length]];
 document.getElementById('tabs').innerHTML=tabs.map(t=>'<div class="tab'+(tab===t[0]?' on':'')+'" onclick="tab=\''+t[0]+'\';render()">'+t[1]+' '+t[2]+'</div>').join('');
 const L=document.getElementById('list');
 if(tab==='agents'){L.innerHTML=agents(st.agents||[]);return;}
 let arr=(S[tab]||[]).slice().sort((x,y)=>SEVN[x.sev]-SEVN[y.sev]);
 if(!arr.length){L.innerHTML='<div class="empty">Пусто — тут ничего нет 👌</div>';return;}
 L.innerHTML=arr.map((x,i)=>card(x,i,tab)).join('');
}
function kpi(v,l,c){return '<div class="kpi"><b style="color:'+c+'">'+v+'</b><span>'+l+'</span></div>';}
const STAGE={queued:['⏳ в очереди','var(--mut)'],fixing:['✏️ пишу фикс','var(--acc)'],sandbox_testing:['🧪 тест в песочнице','var(--high)'],awaiting_approval:['✅ песочница чиста — жду решения','var(--ok)'],approved:['⏳ деплой одобрен','var(--ok)'],promoting:['🚀 переношу на боевую','var(--acc)'],failed:['❌ не удалось','var(--crit)'],done:['✔ в проде','var(--ok)']};
// Человеческое описание: за что отвечает модуль (чтобы понимать что и зачем).
const MOD_DESC={schedule:'Запись клиентов, календарь, перенос/отмена, длительность визитов',api:'HTTP-эндпоинты CRM: методы, авторизация, валидация данных',security:'Защита: доступы, SQL-инъекции, обход прав, чужие данные',ux:'Страницы админки: открытие, кнопки, формы, ошибки JavaScript',load:'Нагрузка: массовые данные, скорость, деградация под нагрузкой',cash:'Касса: приходы и расходы, корректность сумм',payouts:'Зарплаты и выплаты мастерам',subscriptions:'Абонементы: остатки, сроки, статусы',reviews:'Отзывы клиентов: рейтинги',finance:'Финансы: сверка кассы, KPI, отчёты',clients:'Клиентская база, карточки',masters:'Мастера, расписание, зарплатные схемы',warehouse:'Склад: остатки, списания',eventbus:'Автоматизации и события системы'};
function card(x,i,t){
 const id='d'+t+i,manual=t==='manual';
 const st=STAGE[x.fixStage]||null;
 const desc=MOD_DESC[x.module]||('модуль «'+esc(x.module)+'»');
 const ready=x.fixStage==='awaiting_approval';
 let acts='<button class="btn more" onclick="tgl(\''+id+'\')">Подробно</button>';
 if(t==='inProgress'){
   if(ready) acts+='<button class="btn fix" onclick="if(confirm(\'Задеплоить этот фикс на БОЕВУЮ базу? Он уже проверен в песочнице.\'))act(\''+x.sig+'\',\'promote\')">🚀 Деплоить на боевую</button><button class="btn ign" onclick="act(\''+x.sig+'\',\'reject\')">✖ Отклонить</button>';
   else if(x.fixStage==='failed') acts+='<button class="btn fix" onclick="act(\''+x.sig+'\',\'fix\')">↻ Повторить</button><button class="btn ign" onclick="act(\''+x.sig+'\',\'reject\')">✖ Снять</button>';
 } else {
   if(t==='open') acts+='<button class="btn fix" onclick="act(\''+x.sig+'\',\'fix\')">🔧 '+(x.fixRequested?'В работе ✓':'Чинить')+'</button>';
   if(t!=='ignored'&&t!=='closed') acts+='<button class="btn ign" onclick="act(\''+x.sig+'\',\'ignore\')">🙈 Не баг</button>';
 }
 // Крупное предупреждение перед деплоем — что именно уйдёт в боевую.
 const deployWarn=ready?'<div style="background:#0e2a1e;border:1px solid var(--ok);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px"><b>⚠️ Перед деплоем:</b> фикс проверен в песочнице (баг ушёл, новых нет). '+(x.fixLog?esc(x.fixLog):'')+'</div>':'';
 const manualNote=(manual&&x.manualReason)?'<div style="background:#2a2410;border:1px solid var(--high);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px"><b>✋ Почему вручную:</b> '+esc(x.manualReason)+'</div>':'';
 return '<div class="card"><div class="h"><div><span class="mod">'+esc(x.module)+'</span> <span class="tag">'+esc(x.role)+'</span>'+
  '<div class="ttl">'+esc(x.title)+'</div>'+(x.actual?'<div class="meta">'+esc(x.actual)+'</div>':'')+
  '<div class="meta" style="color:var(--acc);margin-top:3px">🔍 За что отвечает: '+desc+'</div>'+
  (st?'<div style="margin-top:6px"><span class="tag" style="color:'+st[1]+';border-color:'+st[1]+'">'+st[0]+'</span></div>':'')+'</div>'+
  '<span class="sev '+x.sev+'">'+x.sev+'</span></div>'+
  deployWarn+manualNote+
  '<div class="det" id="'+id+'">'+
   (x.scenario?'<div><span class="lbl">Что проверяли:</span> '+esc(x.scenario)+'</div>':'')+
   (x.expected?'<div><span class="lbl">Ожидалось:</span> '+esc(x.expected)+'</div>':'')+
   (x.actual?'<div><span class="lbl">Получили:</span> '+esc(x.actual)+'</div>':'')+
   (x.cause?'<div><span class="lbl">Причина:</span> '+esc(x.cause)+'</div>':'')+
   (x.fixLog&&!ready?'<div><span class="lbl">Что делает система:</span> '+esc(x.fixLog)+'</div>':'')+
   (x.fixBranch?'<div><span class="lbl">Ветка фикса:</span> '+esc(x.fixBranch)+'</div>':'')+
   '<div class="lbl">Замечен '+(x.seenCount||1)+'× · с '+((x.firstSeen||'')+'').slice(0,10)+'</div></div>'+
  '<div class="acts">'+acts+'</div></div>';
}
function agents(a){if(!a.length)return '<div class="empty">нет данных</div>';
 const ic={ready:'#33d69f',partial:'#ffd93d',gated:'#8a92a0',meta:'#6c8cff'};
 return '<div class="card"><table>'+a.map(x=>'<tr><td><span class="dot" style="background:'+(ic[x.status]||'#888')+'"></span>'+esc(x.role)+'</td>'+
  '<td class="meta">'+esc(x.covers||'')+'</td><td style="text-align:right;white-space:nowrap">циклов '+((x.stats&&x.stats.cycles)||0)+'<br>сработок '+((x.stats&&x.stats.bugs)||0)+'</td></tr>').join('')+'</table></div>'+
  '<div class="meta" style="margin-top:8px">«сработок» = сколько раз агент отметил проблему за все циклы (одна и та же считается каждый раз). Реальные <b>уникальные</b> баги — в счётчиках сверху.</div>';
}
load();setInterval(load,15000);
</script></body></html>
