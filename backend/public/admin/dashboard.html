<!doctype html>
<html lang="uk">
<head>
  <script src="/p/tenant-boot.js"></script>
<meta charset="utf-8">
<title>SVS Admin — Системний статус</title>
<meta name="viewport" content="width=1280">
<script>try{if(localStorage.getItem("svs_sb_collapsed")==="1")document.documentElement.classList.add("sb-collapsed");}catch(e){}</script>
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  /* страничные стили: бар-чарт и светофор */
  .bar { background: linear-gradient(180deg,#22c55e,#16a34a); border-radius: 4px 4px 0 0; min-height: 2px; flex: 1; }
  .chart { display: flex; align-items: flex-end; gap: 8px; height: 192px; }
  .chart-labels { display: flex; gap: 8px; font-size: 11px; color: var(--text-secondary); margin-top: 8px; overflow-x: auto; }
  .chart-labels div { flex: 1; text-align: center; }
  .light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; flex: none; }
  .light.ready { background: var(--success); box-shadow: 0 0 8px #2DC96F88; }
  .light.awaiting { background: var(--warning); }
  .light.error { background: var(--danger); }
  .readiness-item { display: flex; align-items: center; font-size: 13px; }
  .num { text-align: right; }
  .low-crit { color: var(--danger); font-weight: 700; }
</style>
</head>
<body>
<div class="content">

  <div class="card" id="token-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span class="muted">Admin token:</span>
    <input id="tok" type="password" class="inp" style="flex:1;min-width:200px" placeholder="вставити x-admin-token">
    <button class="btn" onclick="saveTok()">Зберегти і завантажити</button>
  </div>

  <!-- KPI -->
  <div class="grid grid-4" style="margin-bottom:16px">
    <div class="stat"><div class="label">Виторг</div><div class="value" id="kpi-rev">—</div><div class="muted" style="font-size:11px">грн (paid+)</div></div>
    <div class="stat"><div class="label">Завершені</div><div class="value" id="kpi-done">—</div><div class="muted" style="font-size:11px">замовлень</div></div>
    <div class="stat"><div class="label">Очікують</div><div class="value" id="kpi-pending">—</div><div class="muted" style="font-size:11px">new</div></div>
    <div class="stat"><div class="label">Клієнтів</div><div class="value" id="kpi-clients">—</div><div class="muted" style="font-size:11px">всього</div></div>
    <div class="stat"><div class="label">Активних SKU</div><div class="value" id="kpi-products">—</div><div class="muted" style="font-size:11px">товарів</div></div>
  </div>

  <!-- Світлофор готовності -->
  <div class="card">
    <h3>Світлофор готовності інтеграцій</h3>
    <div id="readiness" class="grid grid-2">завантаження…</div>
  </div>

  <!-- Графік виторгу -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin-bottom:0">Виторг по днях</h3>
      <select id="days-sel" class="inp" style="width:auto" onchange="loadRevenue()">
        <option value="7">7 днів</option>
        <option value="14" selected>14 днів</option>
        <option value="30">30 днів</option>
        <option value="90">90 днів</option>
      </select>
    </div>
    <div id="chart" class="chart"></div>
    <div id="chart-labels" class="chart-labels"></div>
  </div>

  <!-- Топ товари + Низькі залишки -->
  <div class="grid grid-2">
    <div class="card" style="margin-bottom:0">
      <h3>Топ-20 товарів по виторгу</h3>
      <table class="tbl">
        <thead><tr><th>Товар</th><th class="num">Шт</th><th class="num">Грн</th></tr></thead>
        <tbody id="top-tbody"><tr><td colspan="3" class="muted">завантаження…</td></tr></tbody>
      </table>
    </div>
    <div class="card" style="margin-bottom:0">
      <h3>Низькі залишки (≤ 5)</h3>
      <table class="tbl">
        <thead><tr><th>Товар</th><th>Об'єм</th><th class="num">Залишок</th><th class="num">Резерв</th></tr></thead>
        <tbody id="low-tbody"><tr><td colspan="4" class="muted">завантаження…</td></tr></tbody>
      </table>
    </div>
  </div>

  <p id="err" style="margin-top:16px;color:var(--danger);font-size:13px"></p>

</div>

<script src="/admin/assets/admin-shell.js" data-title="Системний статус"></script>
<script>
const API = location.origin;
document.getElementById('tok').value = adminToken();

function saveTok() {
  const t = document.getElementById('tok').value.trim();
  localStorage.setItem('svs_admin_token', t);
  loadAll();
}

function showErr(e) { document.getElementById('err').textContent = e || ''; }

async function loadKpi() {
  const r = await adminFetch(API + '/api/admin/stats');
  if (!r.ok) { showErr('KPI: ' + r.status); return; }
  const d = (await r.json()).stats || {};
  document.getElementById('kpi-rev').textContent = Math.round(d.revenue || 0).toLocaleString('uk-UA');
  document.getElementById('kpi-done').textContent = d.orders_completed || 0;
  document.getElementById('kpi-pending').textContent = d.orders_pending || 0;
  document.getElementById('kpi-clients').textContent = d.clients || 0;
  document.getElementById('kpi-products').textContent = d.products_active || 0;
}

async function loadReadiness() {
  const r = await fetch(API + '/api/shop/readiness');
  const d = await r.json();
  const labels = {
    database: 'Postgres БД', admin_token: 'Admin токен', mono_acquiring: 'Mono Pay',
    nova_poshta: 'Нова Пошта', sms_provider: 'SMS провайдер', telegram_bot: 'Telegram бот',
    beautypro_crm: 'BeautyPro CRM'
  };
  const c = d.components || {};
  const html = Object.entries(c).map(([k, v]) =>
    `<div class="readiness-item"><span class="light ${v}"></span>${labels[k] || k}: <b style="margin-left:4px">${v}</b></div>`
  ).join('');
  document.getElementById('readiness').innerHTML = html;
}

async function loadRevenue() {
  const days = document.getElementById('days-sel').value;
  const r = await adminFetch(API + '/api/admin/stats/revenue-by-day?days=' + days);
  if (!r.ok) { showErr('Revenue: ' + r.status); return; }
  const items = (await r.json()).items || [];
  const max = Math.max(1, ...items.map(x => x.revenue));
  const chart = document.getElementById('chart'), lab = document.getElementById('chart-labels');
  chart.innerHTML = ''; lab.innerHTML = '';
  if (!items.length) { chart.innerHTML = '<div class="muted" style="font-size:13px">немає даних за період</div>'; return; }
  items.forEach(x => {
    const h = Math.round((x.revenue / max) * 180);
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = h + 'px';
    bar.title = `${x.day}: ${Math.round(x.revenue)} грн / ${x.orders} замовл.`;
    chart.appendChild(bar);
    const l = document.createElement('div');
    l.textContent = x.day.slice(5);
    lab.appendChild(l);
  });
}

async function loadTop() {
  const r = await adminFetch(API + '/api/admin/stats/top-products');
  if (!r.ok) { showErr('Top: ' + r.status); return; }
  const items = (await r.json()).items || [];
  document.getElementById('top-tbody').innerHTML = items.length
    ? items.map(x => `<tr><td>${x.product_name}</td><td class="num">${x.qty}</td><td class="num">${Math.round(x.revenue).toLocaleString('uk-UA')}</td></tr>`).join('')
    : '<tr><td colspan="3" class="muted">немає продажів</td></tr>';
}

async function loadLow() {
  const r = await adminFetch(API + '/api/admin/stats/low-stock?threshold=5');
  if (!r.ok) { showErr('Low: ' + r.status); return; }
  const items = (await r.json()).items || [];
  document.getElementById('low-tbody').innerHTML = items.length
    ? items.map(x => `<tr><td>${x.product_name}</td><td>${x.volume || '—'}</td><td class="num ${x.stock_qty<=2?'low-crit':''}">${x.stock_qty ?? 0}</td><td class="num muted">${x.reserved_qty ?? 0}</td></tr>`).join('')
    : '<tr><td colspan="4" class="muted">залишки в нормі</td></tr>';
}

async function loadAll() {
  showErr('');
  if (!adminToken()) { showErr('Введи admin token зверху'); return; }
  await Promise.all([loadKpi(), loadReadiness(), loadRevenue(), loadTop(), loadLow()]);
}

loadAll();
setInterval(loadAll, 30000); // auto-refresh кожні 30с
</script>
</body>
</html>
