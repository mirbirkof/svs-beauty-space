<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>SVS Admin — Інтеграції</title>
<meta name="viewport" content="width=1280">
<script>try{if(localStorage.getItem("svs_sb_collapsed")==="1")document.documentElement.classList.add("sb-collapsed");}catch(e){}</script>
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  .intro { color:var(--text-secondary); font-size:14px; margin:2px 0 16px; }
  .sumbar { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:18px; }
  .sumbox { border:1px solid var(--border,#eee); border-radius:12px; padding:12px 18px; min-width:130px; }
  .sumbox .n { font-size:24px; font-weight:700; }
  .sumbox .l { font-size:12px; color:var(--text-secondary); }
  .grp-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
               color:var(--text-secondary); margin:22px 0 10px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .icard { border:1px solid var(--border,#eee); border-radius:14px; padding:16px; background:var(--card,#fff);
           display:flex; flex-direction:column; gap:8px; }
  .icard .top { display:flex; align-items:center; gap:10px; }
  .icard .ic { width:40px; height:40px; border-radius:10px; display:grid; place-items:center;
               background:var(--primary-light,#EDEDFA); color:var(--primary,#5B5FC7); }
  .icard .ic .material-icons-round { font-size:22px; }
  .icard .nm { font-weight:700; font-size:15px; }
  .icard .desc { font-size:13px; color:var(--text-secondary); line-height:1.45; }
  .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px;
           font-size:12px; font-weight:600; width:fit-content; }
  .badge.on  { background:#E3F6E9; color:#1B7A3D; }
  .badge.off { background:#FBE9E7; color:#B23B2E; }
  .badge .material-icons-round { font-size:14px; }
  .how { font-size:12px; color:var(--text-secondary); background:var(--bg,#F7F7FB); border-radius:8px;
         padding:8px 10px; line-height:1.45; }
  .how b { color:var(--text,#222); }
  .reload { float:right; }
  .icard.clk { cursor:pointer; transition:box-shadow .15s, transform .15s; }
  .icard.clk:hover { box-shadow:0 4px 16px rgba(0,0,0,.10); transform:translateY(-1px); }
  .icard .edit-hint { font-size:12px; color:var(--primary,#5B5FC7); display:flex; align-items:center; gap:4px; margin-top:2px; }
  .icard .edit-hint .material-icons-round { font-size:15px; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center;
              justify-content:center; z-index:9999; padding:16px; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--card,#fff); border-radius:16px; max-width:460px; width:100%; padding:22px;
           box-shadow:0 20px 60px rgba(0,0,0,.3); max-height:90vh; overflow:auto; }
  .modal h3 { margin:0 0 4px; font-size:18px; }
  .modal .sub { color:var(--text-secondary); font-size:13px; margin-bottom:16px; line-height:1.4; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
  .fld .st { font-weight:500; font-size:12px; margin-left:6px; }
  .fld .st.on { color:#1B7A3D; } .fld .st.off { color:#B23B2E; }
  .fld input { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border,#ddd);
               border-radius:9px; font-size:14px; font-family:inherit; }
  .modal-act { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
  .modal-msg { font-size:13px; min-height:18px; margin-top:8px; }
</style>
</head>
<body>
<div class="content">

  <h2 style="margin:0">Інтеграції <button class="btn reload" onclick="load()"><span class="material-icons-round" style="font-size:16px;vertical-align:-3px">refresh</span> Оновити</button></h2>
  <div class="intro">Всі зовнішні сервіси, які можна підключити до CRM. Зелений статус — працює, сірий — чекає підключення.</div>

  <div class="sumbar" id="sumbar"></div>
  <div id="groups"></div>

</div>

<div class="modal-bg" id="cfgBg">
  <div class="modal">
    <h3 id="cfgTitle">Налаштування</h3>
    <div class="sub" id="cfgSub"></div>
    <div id="cfgFields"></div>
    <div class="modal-msg" id="cfgMsg"></div>
    <div class="modal-act">
      <button class="btn" onclick="cfgClose()">Скасувати</button>
      <button class="btn primary" id="cfgSave" onclick="cfgSaveDo()">Зберегти</button>
    </div>
  </div>
</div>

<script src="/admin/assets/admin-shell.js" data-title="Інтеграції"></script>
<script>
async function load() {
  const wrap = document.getElementById('groups');
  wrap.innerHTML = '<div class="muted" style="padding:20px">Завантаження…</div>';
  try {
    const r = await adminFetch('/api/integrations/status');
    if (r.status === 401) { wrap.innerHTML = '<div class="muted" style="padding:20px">Потрібна авторизація.</div>'; return; }
    const data = await r.json();
    renderSummary(data.summary);
    renderGroups(data.groups);
  } catch (e) {
    wrap.innerHTML = '<div class="muted" style="padding:20px;color:#B23B2E">Помилка: ' + e.message + '</div>';
  }
}

function renderSummary(s) {
  const pending = s.total - s.connected;
  document.getElementById('sumbar').innerHTML =
    `<div class="sumbox"><div class="n">${s.total}</div><div class="l">усього інтеграцій</div></div>
     <div class="sumbox"><div class="n" style="color:#1B7A3D">${s.connected}</div><div class="l">підключено</div></div>
     <div class="sumbox"><div class="n" style="color:#B23B2E">${pending}</div><div class="l">очікують</div></div>`;
}

function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

const ITEMS = {}; // key → item (для модалки)

function renderGroups(groups) {
  document.getElementById('groups').innerHTML = groups.map(g => {
    const cards = g.items.map(it => {
      ITEMS[it.key] = it;
      const badge = it.configured
        ? '<span class="badge on"><span class="material-icons-round">check_circle</span>Підключено</span>'
        : '<span class="badge off"><span class="material-icons-round">radio_button_unchecked</span>Не підключено</span>';
      const how = it.configured ? '' :
        `<div class="how"><b>Як підключити:</b> ${esc(it.how)}</div>`;
      const editable = (it.fields || []).some(f => f.allowed);
      const hint = editable
        ? `<div class="edit-hint"><span class="material-icons-round">tune</span>Натисніть, щоб ${it.configured ? 'змінити' : 'ввести'} ключі</div>` : '';
      return `<div class="icard${editable ? ' clk' : ''}"${editable ? ` onclick="cfgOpen('${esc(it.key)}')"` : ''}>
        <div class="top">
          <div class="ic"><span class="material-icons-round">${esc(it.icon)}</span></div>
          <div><div class="nm">${esc(it.name)}</div></div>
        </div>
        ${badge}
        <div class="desc">${esc(it.desc)}</div>
        ${how}
        ${hint}
      </div>`;
    }).join('');
    return `<div class="grp-title">${esc(g.category)}</div><div class="cards">${cards}</div>`;
  }).join('');
}

let cfgKey = null;
function cfgOpen(key) {
  const it = ITEMS[key]; if (!it) return;
  cfgKey = key;
  document.getElementById('cfgTitle').textContent = it.name;
  document.getElementById('cfgSub').innerHTML = esc(it.how || '');
  document.getElementById('cfgMsg').textContent = '';
  const fields = (it.fields || []).filter(f => f.allowed);
  document.getElementById('cfgFields').innerHTML = fields.map(f => {
    const st = f.set ? '<span class="st on">збережено</span>' : '<span class="st off">не задано</span>';
    const ph = f.set ? 'Залиште порожнім, щоб не змінювати' : 'Вставте ключ';
    return `<div class="fld">
      <label>${esc(f.name)} ${st}</label>
      <input type="text" autocomplete="off" data-name="${esc(f.name)}" placeholder="${ph}">
    </div>`;
  }).join('');
  document.getElementById('cfgBg').classList.add('show');
}
function cfgClose() { document.getElementById('cfgBg').classList.remove('show'); cfgKey = null; }
document.getElementById('cfgBg').addEventListener('click', e => { if (e.target.id === 'cfgBg') cfgClose(); });

async function cfgSaveDo() {
  const btn = document.getElementById('cfgSave');
  const msg = document.getElementById('cfgMsg');
  const values = {};
  document.querySelectorAll('#cfgFields input').forEach(inp => {
    const v = inp.value.trim();
    if (v) values[inp.getAttribute('data-name')] = v; // порожні не чіпаємо
  });
  if (!Object.keys(values).length) { msg.style.color = '#B23B2E'; msg.textContent = 'Нема що зберігати — введіть хоча б один ключ.'; return; }
  btn.disabled = true; msg.style.color = 'var(--text-secondary)'; msg.textContent = 'Зберігаю…';
  try {
    const r = await adminFetch('/api/integrations/configure', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    msg.style.color = '#1B7A3D'; msg.textContent = 'Збережено ✓';
    setTimeout(() => { cfgClose(); load(); }, 700);
  } catch (e) {
    msg.style.color = '#B23B2E'; msg.textContent = 'Помилка: ' + e.message;
  } finally { btn.disabled = false; }
}

load();
</script>
</body>
</html>
