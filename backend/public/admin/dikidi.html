<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVS Beauty — Відгуки та промо (запис)</title>
<script>try{if(localStorage.getItem("svs_sb_collapsed")==="1")document.documentElement.classList.add("sb-collapsed");}catch(e){}</script>
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  /* Вкладки (свои, в светлых цветах токенов каркаса) */
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:16px; flex-wrap:wrap; }
  .tab { padding:10px 16px; border-radius:var(--radius-sm) var(--radius-sm) 0 0; cursor:pointer; font-weight:500; font-size:13px; color:var(--text-secondary); }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--primary-light); color:var(--primary); font-weight:600; }

  .hidden { display:none !important; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .row .grow { flex:1; min-width:160px; }

  .star { color:var(--warning); font-size:18px; }
  .star.dim { color:var(--border); }

  /* Таблицы, генерируемые скриптом (без класса) — стиль как table.tbl */
  main table { width:100%; border-collapse:collapse; font-size:13px; }
  main th { text-align:left; padding:8px 10px; color:var(--text-secondary); font-size:11px; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); }
  main td { padding:9px 10px; border-bottom:1px solid var(--border); }
  main tr:hover td { background:var(--bg); }
  main code { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-size:12px; }

  /* Бейджи статусов (классы из шаблонов скрипта) */
  .b-pub, .b-on { background:#E6F9EF; color:var(--success); }
  .b-hid { background:#FDECEC; color:var(--danger); }
  .b-pen { background:#FEF4E2; color:var(--warning); }
  .b-off { background:#EEF0F4; color:var(--text-secondary); }

  /* Утилитарные классы, используемые в шаблонах скрипта (бывший Tailwind) */
  .text-xs { font-size:11px; }
  .text-gray-500 { color:var(--text-secondary); }
  .text-red-600 { color:var(--danger); }
  .text-emerald-600 { color:var(--success); }
  .underline { text-decoration:underline; }
  .hover\:underline:hover { text-decoration:underline; }
  main button.text-xs { background:none; border:none; cursor:pointer; font-family:inherit; padding:0; }

  .promo-form { background:var(--primary-light); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; margin-bottom:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .promo-form .span2 { grid-column:span 2; }

  .sec-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .sec-head h2 { font-size:15px; font-weight:700; }
</style>
</head>
<body>

<div class="content">

<div class="row" style="justify-content:flex-end;margin-bottom:10px">
  <span class="muted" id="status" style="font-size:12px">підключення…</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="reviews">Відгуки</div>
  <div class="tab" data-tab="promotions">Акції</div>
  <div class="tab" data-tab="blacklist">Чорний список</div>
  <div class="tab" data-tab="favorites">Обране (по клієнту)</div>
</div>

<main>

<!-- REVIEWS -->
<section id="t-reviews" class="card">
  <div class="sec-head">
    <h2>Відгуки клієнтів</h2>
    <div class="row">
      <input id="r-master" placeholder="master_id (фільтр)" class="inp" style="width:180px">
      <select id="r-rating" class="inp" style="width:auto">
        <option value="">Усі рейтинги</option>
        <option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
      </select>
      <button onclick="loadReviews()" class="btn">Фільтр</button>
    </div>
  </div>
  <div id="r-list">Завантаження…</div>
</section>

<!-- PROMOTIONS -->
<section id="t-promotions" class="hidden card">
  <div class="sec-head">
    <h2>Акції</h2>
    <button onclick="toggleNewPromo()" class="btn">+ Створити акцію</button>
  </div>
  <form id="new-promo" class="hidden promo-form">
    <input id="p-title" placeholder="Назва (Знижка -30% на Raywell)" class="inp span2">
    <input id="p-desc" placeholder="Опис (опціонально)" class="inp span2">
    <input id="p-pct" type="number" placeholder="Знижка %" class="inp">
    <select id="p-category" class="inp">
      <option value="shop">Магазин</option>
      <option value="salon">Салон</option>
      <option value="combo">Комбо</option>
    </select>
    <input id="p-ends" type="datetime-local" class="inp span2">
    <button type="button" onclick="createPromo()" class="btn span2" style="justify-content:center">Створити</button>
  </form>
  <div id="p-list">Завантаження…</div>
</section>

<!-- BLACKLIST -->
<section id="t-blacklist" class="hidden card">
  <div class="sec-head">
    <h2>Чорний список клієнтів</h2>
  </div>
  <div class="row" style="margin-bottom:14px">
    <input id="bl-phone" placeholder="+380XXXXXXXXX" class="inp" style="width:180px">
    <input id="bl-reason" placeholder="Причина (опціонально)" class="inp grow">
    <button onclick="addBl()" class="btn danger">Заблокувати</button>
  </div>
  <div id="bl-list">Завантаження…</div>
</section>

<!-- FAVORITES -->
<section id="t-favorites" class="hidden card">
  <div class="sec-head">
    <h2>Обране клієнта</h2>
    <div class="row">
      <input id="f-phone" placeholder="+380XXXXXXXXX" class="inp" style="width:180px">
      <button onclick="loadFavs()" class="btn">Показати</button>
    </div>
  </div>
  <div id="f-list" class="muted" style="font-size:13px">Введіть телефон клієнта</div>
</section>

</main>

</div><!-- /.content -->

<script>
const API = 'https://svs-shop-api.onrender.com';

// табы
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
  document.getElementById('t-' + t.dataset.tab).classList.remove('hidden');
});

// Авторизация персонала: тот же токен, что в главной админке (svs_admin_token / admin_token)
const ADMIN_TOKEN = localStorage.getItem('svs_admin_token') || localStorage.getItem('admin_token') || '';
const _fetch = window.fetch.bind(window);
window.fetch = function (url, opts = {}) {
  opts.headers = Object.assign({}, opts.headers || {}, ADMIN_TOKEN ? { 'X-Admin-Token': ADMIN_TOKEN } : {});
  return _fetch(url, opts).then(r => {
    if (r.status === 401 && ADMIN_TOKEN && !window.__reauthAsked) {
      window.__reauthAsked = true;
      // токен протух — сброс и повторный ввод
      localStorage.removeItem('svs_admin_token');
      const t = prompt('Токен недійсний. Введіть admin-токен заново:');
      if (t) { localStorage.setItem('svs_admin_token', t.trim()); location.reload(); }
    }
    return r;
  });
};
if (!ADMIN_TOKEN) {
  const t = prompt('Введіть admin-токен (як у головній адмінці):');
  if (t) { localStorage.setItem('svs_admin_token', t.trim()); location.reload(); }
}

// health
fetch(API + '/health').then(r => r.json()).then(d => {
  document.getElementById('status').textContent = d.ok ? '✓ API підключено' : '✗ помилка API';
}).catch(() => document.getElementById('status').textContent = '✗ немає зв’язку з API');

function stars(n) {
  let s = '';
  for (let i=1; i<=5; i++) s += `<span class="star ${i<=n?'':'dim'}">★</span>`;
  return s;
}

// === REVIEWS ===
async function loadReviews() {
  const master = document.getElementById('r-master').value.trim();
  const rating = document.getElementById('r-rating').value;
  const params = new URLSearchParams();
  if (master) params.append('master_id', master);
  if (rating) params.append('rating', rating);
  const r = await fetch(`${API}/api/reviews?${params}`).then(r => r.json());
  const list = document.getElementById('r-list');
  if (!r.items?.length) { list.innerHTML = '<p class="text-gray-500">Відгуків немає</p>'; return; }
  list.innerHTML = `<table><thead><tr><th>Дата</th><th>Клієнт</th><th>Майстер</th><th>Рейтинг</th><th>Текст</th><th>Статус</th><th></th></tr></thead><tbody>${
    r.items.map(x => `
      <tr>
        <td>${new Date(x.created_at).toLocaleString('ru-UA')}</td>
        <td>${x.display_name}</td>
        <td>${x.master_name || x.master_id || '—'}</td>
        <td>${stars(x.rating)}</td>
        <td>${(x.text||'').replace(/</g,'&lt;')}</td>
        <td><span class="badge b-pub">опубліковано</span></td>
        <td><button onclick="modReview(${x.id}, 'hidden')" class="text-red-600 text-xs hover:underline">Сховати</button></td>
      </tr>
    `).join('')
  }</tbody></table>`;
}
async function modReview(id, status) {
  await fetch(`${API}/api/reviews/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  loadReviews();
}

// === PROMOTIONS ===
function toggleNewPromo() { document.getElementById('new-promo').classList.toggle('hidden'); }
async function createPromo() {
  const body = {
    title: document.getElementById('p-title').value.trim(),
    description: document.getElementById('p-desc').value.trim() || null,
    discount_pct: parseInt(document.getElementById('p-pct').value) || null,
    category: document.getElementById('p-category').value,
    ends_at: document.getElementById('p-ends').value || null
  };
  if (!body.title) { alert('Назва обов’язкова'); return; }
  await fetch(`${API}/api/promotions`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  document.getElementById('new-promo').classList.add('hidden');
  ['p-title','p-desc','p-pct','p-ends'].forEach(id => document.getElementById(id).value = '');
  loadPromos();
}
async function loadPromos() {
  const r = await fetch(`${API}/api/promotions`).then(r => r.json());
  const list = document.getElementById('p-list');
  if (!r.items?.length) { list.innerHTML = '<p class="text-gray-500">Акцій немає</p>'; return; }
  list.innerHTML = `<table><thead><tr><th>Назва</th><th>Знижка</th><th>Категорія</th><th>До</th><th>Статус</th><th></th></tr></thead><tbody>${
    r.items.map(x => `
      <tr>
        <td><b>${x.title}</b><br><span class="text-xs text-gray-500">${x.description||''}</span></td>
        <td>${x.discount_pct ? '−'+x.discount_pct+'%' : (x.discount_uah ? '−'+x.discount_uah+'₴' : '—')}</td>
        <td>${x.category}</td>
        <td>${x.ends_at ? new Date(x.ends_at).toLocaleDateString('ru-UA') : 'безстроково'}</td>
        <td><span class="badge ${x.is_active?'b-on':'b-off'}">${x.is_active?'активна':'вимкнена'}</span></td>
        <td><button onclick="togglePromo(${x.id}, ${!x.is_active})" class="text-xs underline">${x.is_active?'Вимкнути':'Увімкнути'}</button></td>
      </tr>
    `).join('')
  }</tbody></table>`;
}
async function togglePromo(id, on) {
  await fetch(`${API}/api/promotions/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({is_active: on})
  });
  loadPromos();
}

// === BLACKLIST ===
async function addBl() {
  const phone = document.getElementById('bl-phone').value.trim();
  const reason = document.getElementById('bl-reason').value.trim();
  if (!phone) { alert('Телефон обов’язковий'); return; }
  await fetch(`${API}/api/blacklist`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({client_phone: phone, reason})});
  document.getElementById('bl-phone').value = '';
  document.getElementById('bl-reason').value = '';
  loadBl();
}
async function loadBl() {
  const r = await fetch(`${API}/api/blacklist`).then(r => r.json());
  const list = document.getElementById('bl-list');
  if (!r.items?.length) { list.innerHTML = '<p class="text-gray-500">Список порожній</p>'; return; }
  list.innerHTML = `<table><thead><tr><th>Телефон</th><th>Причина</th><th>Коли</th><th></th></tr></thead><tbody>${
    r.items.map(x => `
      <tr>
        <td><code>${x.client_phone}</code></td>
        <td>${x.reason||'—'}</td>
        <td>${new Date(x.created_at).toLocaleString('ru-UA')}</td>
        <td><button onclick="rmBl('${encodeURIComponent(x.client_phone)}')" class="text-emerald-600 text-xs hover:underline">Розблокувати</button></td>
      </tr>
    `).join('')
  }</tbody></table>`;
}
async function rmBl(phone) {
  await fetch(`${API}/api/blacklist/${phone}`, {method:'DELETE'});
  loadBl();
}

// === FAVORITES ===
async function loadFavs() {
  const phone = document.getElementById('f-phone').value.trim();
  if (!phone) return;
  const r = await fetch(`${API}/api/favorites?phone=${encodeURIComponent(phone)}`).then(r => r.json());
  const list = document.getElementById('f-list');
  if (!r.items?.length) { list.innerHTML = '<p class="text-gray-500">Обраного немає</p>'; return; }
  list.innerHTML = `<table><thead><tr><th>Тип</th><th>Назва</th><th>ID</th><th>Коли</th></tr></thead><tbody>${
    r.items.map(x => `
      <tr><td>${x.kind}</td><td>${x.target_name||'—'}</td><td><code>${x.target_id}</code></td><td>${new Date(x.created_at).toLocaleString('ru-UA')}</td></tr>
    `).join('')
  }</tbody></table>`;
}

// init
loadReviews();
loadPromos();
loadBl();
</script>
<script src="/admin/assets/admin-shell.js" data-title="Відгуки та промо (запис)"></script>
</body>
</html>
