<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVS CRM — Вхід</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  /* страничные стили: центрированная карточка логина */
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { max-width:380px; width:100%; padding:32px; margin-bottom:0; box-shadow:0 8px 32px rgba(30,31,43,.08); }
  .login-card h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .sub { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
  label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; margin-top:14px; }
  .login-card .btn { width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:18px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  input.inp[disabled] { opacity:.5; }
  .msg { margin-top:14px; padding:10px 12px; border-radius:var(--radius-sm); font-size:13px; display:none; }
  .msg.ok { background:#E6F9EF; color:var(--success); display:block; }
  .msg.err { background:#FDECEC; color:var(--danger); display:block; }
  .step { display:none; }
  .step.active { display:block; }
  .code-input { letter-spacing:.4em; text-align:center; font-size:22px; font-weight:600; }
  .back { margin-top:14px; color:var(--text-secondary); font-size:13px; text-align:center; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
  <div class="card login-card">
    <h1>SVS CRM</h1>
    <div class="sub">Вхід для співробітників через Telegram-код</div>

    <div id="step-phone" class="step active">
      <label for="phone">Номер телефону</label>
      <input id="phone" class="inp" type="tel" placeholder="+380XXXXXXXXX" autocomplete="tel">
      <button id="btn-request" class="btn">Надіслати код у Telegram</button>
      <div id="msg1" class="msg"></div>
    </div>

    <div id="step-code" class="step">
      <label for="code">Код з Telegram</label>
      <input id="code" class="inp code-input" type="tel" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <button id="btn-verify" class="btn">Увійти</button>
      <div id="msg2" class="msg"></div>
      <div class="back" id="back">Змінити телефон</div>
    </div>
  </div>

<script>
const API = '';  // same-origin
const $ = (id) => document.getElementById(id);

function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
}

function setStep(name) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  $('step-' + name).classList.add('active');
}

let savedPhone = '';

$('btn-request').addEventListener('click', async () => {
  const phone = $('phone').value.trim();
  if (!phone) { showMsg($('msg1'), 'err', 'Введіть номер телефону'); return; }
  $('btn-request').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/staff/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await r.json();
    if (r.status === 429) {
      showMsg($('msg1'), 'err', 'Забагато спроб. Спробуйте через хвилину.');
    } else if (data.ok) {
      savedPhone = phone;
      showMsg($('msg2'), 'ok', data.message || 'Код надіслано');
      setStep('code');
      setTimeout(() => $('code').focus(), 100);
    } else {
      showMsg($('msg1'), 'err', data.error || 'Помилка');
    }
  } catch (e) {
    showMsg($('msg1'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-request').disabled = false;
  }
});

$('btn-verify').addEventListener('click', async () => {
  const code = $('code').value.trim();
  if (!/^\d{6}$/.test(code)) { showMsg($('msg2'), 'err', 'Введіть 6-значний код'); return; }
  $('btn-verify').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/staff/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: savedPhone, code })
    });
    const data = await r.json();
    if (data.ok && data.token) {
      localStorage.setItem('svs_admin_token', data.token);
      localStorage.setItem('svs_user', JSON.stringify(data.user));
      showMsg($('msg2'), 'ok', 'Вхід виконано. Перенаправлення...');
      setTimeout(() => location.href = '/admin/crm-extra.html', 600);
    } else {
      const left = data.attempts_left != null ? ` (залишилось ${data.attempts_left})` : '';
      showMsg($('msg2'), 'err', (data.error === 'invalid-or-expired' ? 'Невірний або прострочений код' : data.error) + left);
    }
  } catch (e) {
    showMsg($('msg2'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-verify').disabled = false;
  }
});

$('back').addEventListener('click', () => {
  setStep('phone');
  $('code').value = '';
  $('msg2').className = 'msg';
});

// Enter submits
$('phone').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-request').click(); });
$('code').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-verify').click(); });
</script>
</body>
</html>
