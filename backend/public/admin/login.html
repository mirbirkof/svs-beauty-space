<!DOCTYPE html>
<html lang="uk">
<head>
  <script src="/p/tenant-boot.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<script>/* Телефон → адаптивний логін (Босс 17.07: повноцінний мобільний для соло).
  На ПК (екран >520px) viewport лишається 1280 — директива №1 для салонів діє. */
try{if(Math.min(screen.width,screen.height)<=520&&matchMedia('(pointer:coarse)').matches){
  document.querySelector('meta[name="viewport"]').setAttribute('content','width=device-width, initial-scale=1');
  document.documentElement.classList.add('m-login');
}}catch(e){}</script>
<style>
  .m-login body { padding:14px; }
  .m-login .login-card { max-width:100%; padding:26px 20px; }
  .m-login input, .m-login .inp { font-size:16px !important; min-height:46px; }
  .m-login .btn { min-height:48px; font-size:16px; }
  .m-login .login-card h1 { font-size:24px; }
</style>
<title>SVS CRM — Вхід</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  /* страничные стили: центрированная карточка логина */
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { max-width:380px; width:100%; padding:32px; margin-bottom:0; box-shadow:0 8px 32px rgba(30,31,43,.08); }
  .login-card h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .sub { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
  label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; margin-top:14px; }
  .login-card .btn { width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:18px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  input.inp[disabled] { opacity:.5; }
  .msg { margin-top:14px; padding:10px 12px; border-radius:var(--radius-sm); font-size:13px; display:none; }
  .msg.ok { background:#E6F9EF; color:var(--success); display:block; }
  .msg.err { background:#FDECEC; color:var(--danger); display:block; }
  .step { display:none; }
  .step.active { display:block; }
  .code-input { letter-spacing:.4em; text-align:center; font-size:22px; font-weight:600; }
  .back { margin-top:14px; color:var(--text-secondary); font-size:13px; text-align:center; cursor:pointer; text-decoration:underline; }
  #forgot-link { margin-top:20px; text-align:center; font-size:12px; color:var(--text-secondary); text-decoration:underline; cursor:pointer; }
  #forgot-link:hover { color:var(--text-primary,#1e1f2b); }
  .tabs { display:flex; gap:8px; margin-bottom:18px; }
  .tab { flex:1; text-align:center; padding:9px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; cursor:pointer; background:var(--bg-secondary,#f3f4f8); color:var(--text-secondary); border:1px solid transparent; }
  .tab.active { background:var(--bg-card,#fff); color:var(--text-primary,#1e1f2b); border-color:var(--border,#e3e4ec); font-weight:600; }
  .remember { display:flex; align-items:center; gap:8px; margin-top:16px; font-size:13px; color:var(--text-secondary); cursor:pointer; }
  .remember input { width:16px; height:16px; margin:0; cursor:pointer; }
  .remember label { margin:0; cursor:pointer; }
</style>
</head>
<body>
  <div class="card login-card">
    <h1>SVS CRM</h1>
    <div class="sub">Вхід для співробітників</div>

    <div class="tabs">
      <div class="tab active" id="tab-tg" data-method="tg">Telegram-код</div>
      <div class="tab" id="tab-pwd" data-method="pwd">Пароль</div>
    </div>

    <!-- Спосіб 1: Telegram-код -->
    <div id="step-phone" class="step active">
      <label for="phone">Номер телефону</label>
      <input id="phone" class="inp" type="tel" placeholder="+380XXXXXXXXX" autocomplete="tel">
      <button id="btn-request" class="btn">Надіслати код у Telegram</button>
      <div id="msg1" class="msg"></div>
    </div>

    <div id="step-code" class="step">
      <label for="code">Код з Telegram</label>
      <input id="code" class="inp code-input" type="tel" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <div class="remember">
        <input type="checkbox" id="remember-tg" checked>
        <label for="remember-tg">Запам'ятати назавжди (не виходити)</label>
      </div>
      <button id="btn-verify" class="btn">Увійти</button>
      <div id="msg2" class="msg"></div>
      <div class="back" id="back">Змінити телефон</div>
    </div>

    <!-- Спосіб 2: Пароль -->
    <div id="step-pwd" class="step">
      <label for="pwd-phone">Номер телефону</label>
      <input id="pwd-phone" class="inp" type="tel" placeholder="+380XXXXXXXXX" autocomplete="tel">
      <label for="pwd-pass">Пароль</label>
      <input id="pwd-pass" class="inp" type="password" placeholder="••••" autocomplete="current-password">
      <div class="remember">
        <input type="checkbox" id="remember-pwd" checked>
        <label for="remember-pwd">Запам'ятати назавжди (не виходити)</label>
      </div>
      <button id="btn-pwd" class="btn">Увійти</button>
      <div id="msg3" class="msg"></div>
      <div class="back" id="pwd-hint">Немає пароля? Увійдіть через Telegram-код і встановіть його в кабінеті.</div>
    </div>

    <!-- Відновлення пароля -->
    <div id="step-forgot" class="step">
      <label for="forgot-id">Телефон або e-mail</label>
      <input id="forgot-id" class="inp" type="text" placeholder="+380XXXXXXXXX або email" autocomplete="username">
      <button id="btn-forgot" class="btn">Надіслати посилання для скидання</button>
      <div id="msg4" class="msg"></div>
      <div class="back" id="back-forgot">← Назад до входу</div>
    </div>

    <!-- Забули пароль? — маленьке посилання внизу меню логіну -->
    <div id="forgot-link" onclick="document.getElementById('go-forgot').click()">Забули пароль?</div>
    <span id="go-forgot" style="display:none"></span>
    <!-- Реєстрація нового салону/майстра -->
    <div id="signup-link" style="margin-top:14px;text-align:center;font-size:13px;color:var(--text-secondary)">Немає акаунту? <a href="/p/signup.html" style="color:var(--primary,#6b4eff);font-weight:600;text-decoration:underline">Зареєструватися</a> — салон або майстер</div>
  </div>

<script>
const API = '';  // same-origin
const $ = (id) => document.getElementById(id);

function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
}

function setStep(name) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  $('step-' + name).classList.add('active');
  // Нижнє посилання «Забули пароль?» ховаємо на самому кроці відновлення.
  const fl = $('forgot-link'); if (fl) fl.style.display = (name === 'forgot') ? 'none' : '';
}

let savedPhone = '';

// Переключение вкладок: Telegram-код / Пароль
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  if (t.dataset.method === 'pwd') setStep('pwd');
  else setStep('phone');
}));

function saveSession(data) {
  localStorage.setItem('svs_admin_token', data.token);
  localStorage.setItem('svs_user', JSON.stringify(data.user));
}

$('btn-request').addEventListener('click', async () => {
  const phone = $('phone').value.trim();
  if (!phone) { showMsg($('msg1'), 'err', 'Введіть номер телефону'); return; }
  $('btn-request').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/staff/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await r.json();
    if (r.status === 429) {
      showMsg($('msg1'), 'err', 'Забагато спроб. Спробуйте через хвилину.');
    } else if (data.ok) {
      savedPhone = phone;
      showMsg($('msg2'), 'ok', data.message || 'Код надіслано');
      setStep('code');
      setTimeout(() => $('code').focus(), 100);
    } else {
      showMsg($('msg1'), 'err', data.error || 'Помилка');
    }
  } catch (e) {
    showMsg($('msg1'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-request').disabled = false;
  }
});

$('btn-verify').addEventListener('click', async () => {
  const code = $('code').value.trim();
  if (!/^\d{6}$/.test(code)) { showMsg($('msg2'), 'err', 'Введіть 6-значний код'); return; }
  $('btn-verify').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/staff/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: savedPhone, code, remember: $('remember-tg').checked })
    });
    const data = await r.json();
    if (data.ok && data.token) {
      saveSession(data);
      showMsg($('msg2'), 'ok', 'Вхід виконано. Перенаправлення...');
      setTimeout(() => location.href = '/admin/index.html', 600);
    } else {
      const left = data.attempts_left != null ? ` (залишилось ${data.attempts_left})` : '';
      showMsg($('msg2'), 'err', (data.error === 'invalid-or-expired' ? 'Невірний або прострочений код' : data.error) + left);
    }
  } catch (e) {
    showMsg($('msg2'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-verify').disabled = false;
  }
});

$('btn-pwd').addEventListener('click', async () => {
  const phone = $('pwd-phone').value.trim();
  const password = $('pwd-pass').value;
  if (!phone || !password) { showMsg($('msg3'), 'err', 'Введіть телефон і пароль'); return; }
  $('btn-pwd').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/staff/login-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password, remember: $('remember-pwd').checked })
    });
    const data = await r.json();
    if (data.ok && data.token) {
      saveSession(data);
      showMsg($('msg3'), 'ok', 'Вхід виконано. Перенаправлення...');
      setTimeout(() => location.href = '/admin/index.html', 600);
    } else if (r.status === 429) {
      showMsg($('msg3'), 'err', 'Забагато спроб. Спробуйте через хвилину.');
    } else if (data.error === 'password-not-set') {
      showMsg($('msg3'), 'err', data.message || 'Пароль не встановлено. Увійдіть через Telegram-код.');
    } else if (data.error === 'invalid-credentials') {
      showMsg($('msg3'), 'err', 'Невірний телефон або пароль');
    } else {
      showMsg($('msg3'), 'err', data.error || 'Помилка входу');
    }
  } catch (e) {
    showMsg($('msg3'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-pwd').disabled = false;
  }
});

$('back').addEventListener('click', () => {
  setStep('phone');
  $('code').value = '';
  $('msg2').className = 'msg';
});

// Відновлення пароля
$('go-forgot').addEventListener('click', () => {
  const pre = $('pwd-phone').value.trim();
  if (pre) $('forgot-id').value = pre;
  setStep('forgot');
  $('msg4').className = 'msg';
  setTimeout(() => $('forgot-id').focus(), 100);
});

$('back-forgot').addEventListener('click', () => {
  setStep('pwd');
  $('msg4').className = 'msg';
});

$('btn-forgot').addEventListener('click', async () => {
  const identifier = $('forgot-id').value.trim();
  if (!identifier) { showMsg($('msg4'), 'err', 'Введіть телефон або e-mail'); return; }
  $('btn-forgot').disabled = true;
  try {
    const r = await fetch(API + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier })
    });
    if (r.status === 429) {
      showMsg($('msg4'), 'err', 'Забагато спроб. Спробуйте пізніше.');
    } else {
      // сервер завжди відповідає ok (захист від перебору) — показуємо нейтральне повідомлення
      showMsg($('msg4'), 'ok', 'Якщо акаунт існує, посилання для скидання надіслано у Telegram або на e-mail. Діє 30 хв.');
    }
  } catch (e) {
    showMsg($('msg4'), 'err', 'Мережева помилка: ' + e.message);
  } finally {
    $('btn-forgot').disabled = false;
  }
});

$('forgot-id').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-forgot').click(); });

// Enter submits
$('phone').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-request').click(); });
$('code').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-verify').click(); });
$('pwd-pass').addEventListener('keypress', e => { if (e.key === 'Enter') $('btn-pwd').click(); });
</script>
</body>
</html>
