<!DOCTYPE html>
<html lang="uk">
<head>
  <script src="/p/tenant-boot.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>SVS CRM — Скидання пароля</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/admin/assets/admin-shell.css">
<style>
  /* страничные стили: центрированная карточка */
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .reset-card { max-width:380px; width:100%; padding:32px; margin-bottom:0; box-shadow:0 8px 32px rgba(30,31,43,.08); }
  .reset-card h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .sub { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
  label { display:block; font-size:13px; color:var(--text-secondary); margin:14px 0 6px; }
  .reset-card .btn { width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:18px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .msg { margin-top:14px; padding:10px 12px; border-radius:var(--radius-sm); font-size:13px; display:none; }
  .msg.ok { background:#E6F9EF; color:var(--success); display:block; }
  .msg.err { background:#FDECEC; color:var(--danger); display:block; }
  .hint { font-size:12px; color:var(--text-secondary); margin-top:6px; }
</style>
</head>
<body>
<div class="card reset-card">
  <h1>SVS CRM</h1>
  <div class="sub">Скидання пароля</div>
  <label for="pwd">Новий пароль</label>
  <input id="pwd" class="inp" type="password" autocomplete="new-password">
  <div class="hint">Мінімум 6 символів.</div>
  <label for="pwd2">Підтвердження</label>
  <input id="pwd2" class="inp" type="password" autocomplete="new-password">
  <button id="btn" class="btn">Зберегти пароль</button>
  <div id="msg" class="msg"></div>
</div>
<script>
const $ = id => document.getElementById(id);
function show(t,k){const m=$('msg');m.className='msg '+k;m.textContent=t;}
function getToken(){return new URLSearchParams(location.search).get('token')||'';}
$('btn').onclick = async () => {
  const p = $('pwd').value, p2 = $('pwd2').value;
  if(p !== p2){ show('Паролі не співпадають','err'); return; }
  if(p.length < 6){ show('Мінімум 6 символів','err'); return; }
  $('btn').disabled = true;
  try {
    const r = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token:getToken(), new_password:p })});
    const d = await r.json();
    if(d.ok){ show('Пароль оновлено. Перенаправлення на вхід...','ok'); setTimeout(()=>location.href='/admin/login.html',1200); }
    else { show(d.error==='token-invalid-or-expired'?'Посилання прострочене':d.error||'Помилка','err'); }
  } catch(e){ show('Мережева помилка: '+e.message,'err'); }
  finally { $('btn').disabled = false; }
};
</script>
</body>
</html>
