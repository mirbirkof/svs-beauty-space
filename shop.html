<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVS Beauty Space — Магазин</title>
  <meta name="description" content="Інтернет-магазин професійної косметики SVS Beauty Space. Доставка по Україні.">
  <meta property="og:title" content="SVS Beauty Space — Магазин">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/product.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAV -->
  <nav class="nav nav--scrolled">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-main">
          <canvas class="nav__lotus nav__lotus--shop" id="shopLotus" aria-hidden="true"></canvas>
          SVS
        </span>
        <span class="nav__logo-sub">Beauty Space</span>
      </a>
      <div class="shop-nav">
        <button class="shop-nav__search-btn" id="searchToggle" aria-label="Пошук">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <a href="account.html" class="shop-nav__account-btn" id="accountBtn" aria-label="Особистий кабінет">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span class="shop-nav__account-label" id="accountLabel">Вхід</span>
        </a>
        <button class="shop-nav__cart-btn" id="cartToggle" aria-label="Кошик">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
          <span class="shop-nav__cart-count" id="cartCount" style="display:none">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- SEARCH BAR (hidden by default) -->
  <div class="search-bar" id="searchBar">
    <div class="container">
      <input type="text" class="search-bar__input" id="searchInput" placeholder="Пошук товарів..." autocomplete="off">
      <button class="search-bar__close" id="searchClose" aria-label="Закрити">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- HERO -->
  <section class="shop-hero">
    <div class="container">
      <p class="t-overline">Інтернет-магазин</p>
      <h1 class="shop-hero__title">Професійна косметика</h1>
      <p class="shop-hero__sub">Засоби, якими працюють наші майстри — тепер для вас</p>
    </div>
  </section>

  <!-- BRANDS -->
  <section class="shop-brands" id="brands">
    <div class="container">
      <div class="shop-brands__grid" id="brandGrid">
        <!-- Filled by JS -->
      </div>
    </div>
  </section>

  <!-- CATEGORIES -->
  <section class="shop-cats" id="categories">
    <div class="container">
      <div class="shop-cats__grid" id="catGrid">
        <!-- Filled by JS -->
      </div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="shop-products" id="products">
    <div class="container">
      <div class="shop-products__header">
        <h2 class="shop-products__title" id="productsTitle">Усі товари</h2>
        <div class="shop-products__sort">
          <select id="sortSelect" class="shop-sort">
            <option value="popular">Популярні</option>
            <option value="price-asc">Ціна: дешевші</option>
            <option value="price-desc">Ціна: дорожчі</option>
            <option value="name">За назвою</option>
          </select>
        </div>
      </div>
      <div class="shop-products__grid" id="productsGrid">
        <!-- Filled by JS -->
      </div>
      <div class="shop-products__empty" id="productsEmpty" style="display:none">
        <p>Товарів не знайдено</p>
      </div>
    </div>
  </section>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer__header">
      <h3>Кошик</h3>
      <button class="cart-drawer__close" id="cartClose" aria-label="Закрити кошик">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="cart-drawer__items" id="cartItems">
      <!-- Filled by JS -->
    </div>
    <div class="cart-drawer__empty" id="cartEmpty">
      <p>Кошик порожній</p>
    </div>
    <div class="cart-drawer__footer" id="cartFooter" style="display:none">
      <div class="cart-drawer__total">
        <span>Разом:</span>
        <span id="cartTotal">0 ₴</span>
      </div>
      <a href="tel:+380991283375" class="btn btn--filled cart-drawer__checkout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        Замовити по телефону
      </a>
      <p class="cart-drawer__hint">Або напишіть нам в <a href="https://instagram.com/svs_beauty_space" target="_blank">Instagram</a></p>
    </div>
  </aside>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer__inner">
      <a href="index.html" class="footer__back">← Повернутись на сайт</a>
      <span class="t-caption">&copy; 2026 SVS Beauty Space</span>
    </div>
  </footer>

  <script src="js/lotus.js"></script>
  <script src="js/shop-data.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
